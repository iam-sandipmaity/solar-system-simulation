<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="8" fill="#000"/>

  <!-- Outer orbit ring -->
  <ellipse cx="16" cy="16" rx="13" ry="5.5"
    stroke="#f0a030" stroke-width="1.2" fill="none" opacity="0.55"
    transform="rotate(-20 16 16)"/>

  <!-- Sun glow -->
  <radialGradient id="sg" cx="42%" cy="38%" r="60%">
    <stop offset="0%" stop-color="#fff7c0"/>
    <stop offset="40%" stop-color="#facc15"/>
    <stop offset="100%" stop-color="#f97316"/>
  </radialGradient>
  <circle cx="16" cy="16" r="6.5" fill="url(#sg)"/>

  <!-- Subtle corona rays -->
  <circle cx="16" cy="16" r="8" fill="#facc15" opacity="0.12"/>

  <!-- Small planet dot on the orbit -->
  <circle cx="27.5" cy="13.8" r="2" fill="#93c5fd"
    transform="rotate(-20 16 16)"/>
</svg>
